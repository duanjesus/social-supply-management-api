name: CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  backend:
    name: Backend – Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: doacoes_db
          POSTGRES_USER: doacoes_user
          POSTGRES_PASSWORD: doacoes_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U doacoes_user -d doacoes_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Build com Maven
        run: mvn -B clean compile

      - name: Executar testes (JUnit + Mockito)
        run: mvn -B test
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: doacoes_db
          DB_USER: doacoes_user
          DB_PASSWORD: doacoes_pass

      - name: Empacotar aplicação
        run: mvn -B package -DskipTests

      - name: Publicar artefato JAR
        uses: actions/upload-artifact@v4
        with:
          name: doacoes-api-jar
          path: backend/target/*.jar

  frontend:
    name: Frontend – Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
