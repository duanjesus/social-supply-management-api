services:
  db:
    image: postgres:16-alpine
    container_name: doacoes-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: doacoes_db
      POSTGRES_USER: doacoes_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-doacoes_pass}
    ports:
      - "5432:5432"
    volumes:
      - doacoes-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U doacoes_user -d doacoes_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    container_name: doacoes-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: doacoes_db
      DB_USER: doacoes_user
      DB_PASSWORD: ${DB_PASSWORD:-doacoes_pass}
      JWT_SECRET: ${JWT_SECRET:-c29jaWFsLXN1cHBseS1tYW5hZ2VtZW50LWFwaS1zdXBlci1zZWNyZXQta2V5LWNoYW5nZS1pbi1wcm9kdWN0aW9u}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
    ports:
      - "8080:8080"

  web:
    build: ./frontend
    container_name: doacoes-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-3000}:80"

volumes:
  doacoes-db-data:
